<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee</title>
    <script src="addEmployee.js" defer></script>
    <link href="styleAdd.css" rel="stylesheet">
</head>
<body>
    <form>
        <div class="full">
            <label for="employeeName">Employee Name</label>
            <input type="text" id="employeeName" name="employeeName" required>
        </div>

        <div>
            <label for="employeeAge">Age</label>
            <input type="number" id="employeeAge" name="employeeAge">
        </div>

        <div>
            <label for="position">Position</label>
            <input type="text" id="position" name="position">
        </div>

        <div>
            <label for="salary">Salary</label>
            <input type="number" id="salary" name="salary" step="0.01">
        </div>

        <div>
            <label for="joinDate">Join Date</label>
            <input type="date" id="joinDate" name="joinDate">
        </div>

        <div class="full">
            <label for="reportTo">Report To</label>
            <input type="text" id="reportTo" name="reportTo">
        </div>

        <input type="submit" value="Add Employee" id="submit-btn" class="full">
    </form>
</body>
</html>
