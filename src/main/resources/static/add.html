<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="addEmployee.js" defer></script>
</head>
<body>
    <form>

        <label for="employeeName">Employee Name:</label>
        <input type="text" id="employeeName" name="employeeName" required><br><br>

        <label for="employeeAge">Employee Age:</label>
        <input type="number" id="employeeAge" name="employeeAge"><br><br>

        <label for="position">Position:</label>
        <input type="text" id="position" name="position"><br><br>

        <label for="salary">Salary:</label>
        <input type="number" id="salary" name="salary" step="0.01"><br><br>

        <label for="joinDate">Join Date:</label>
        <input type="date" id="joinDate" name="joinDate"><br><br>

        <label for="reportTo">Report To:</label>
        <input type="text" id="reportTo" name="reportTo"><br><br>

        <input type="submit" value="Submit" id="submit-btn">
    </form>
</body>
</html>
